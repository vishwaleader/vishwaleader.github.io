<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #eee; padding: 50px; display: flex; justify-content: center; }
        .logo-container {
            position: relative;
            width: 200px;
            height: 200px;
        }
        .logo-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: contain;
        }
        
        .layer-base { clip-path: inset(17.5% 0 0 0); }
        .layer-arc1 { clip-path: inset(13.4% 0 82.5% 0); animation: pulse 1.5s infinite; animation-delay: 0s; }
        .layer-arc2 { clip-path: inset(6.5% 0 86.5% 0); animation: pulse 1.5s infinite; animation-delay: 0.2s; }
        .layer-arc3 { clip-path: inset(0 0 93.5% 0); animation: pulse 1.5s infinite; animation-delay: 0.4s; }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img class="logo-layer layer-base" src="assets/images/vishwaleader-logo-hd.png" />
        <img class="logo-layer layer-arc1" src="assets/images/vishwaleader-logo-hd.png" />
        <img class="logo-layer layer-arc2" src="assets/images/vishwaleader-logo-hd.png" />
        <img class="logo-layer layer-arc3" src="assets/images/vishwaleader-logo-hd.png" />
    </div>
</body>
</html>
