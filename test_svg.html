<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #eee; padding: 50px; display: flex; justify-content: center; align-items: center; }
        .logo-container {
            position: relative;
            width: 120px;
            height: 120px;
            display: flex;
            justify-content: center;
        }
        .globe-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .wifi-svg {
            position: absolute;
            top: 2%; /* adjust to align with globe */
            width: 58%; /* adjust to scale */
            height: auto;
        }
        
        .vl-arc {
            animation: vl-wifi-pulse 1.4s ease-in-out infinite;
            transform-origin: 50% 100%;
        }
        .vl-arc-1 { animation-delay: 0s; }
        .vl-arc-2 { animation-delay: 0.15s; }
        .vl-arc-3 { animation-delay: 0.3s; }
        
        @keyframes vl-wifi-pulse {
            0%, 100% { opacity: 0.2; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.05); }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <!-- SVG arcs -->
        <svg class="wifi-svg" viewBox="0 0 90 46" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="45" cy="42" r="5" fill="#D4AF37" />
            <path class="vl-arc vl-arc-1" d="M30 32 Q45 18 60 32" stroke="#D4AF37" stroke-width="5.5" stroke-linecap="round" fill="none"/>
            <path class="vl-arc vl-arc-2" d="M16 20 Q45 0 74 20" stroke="#D4AF37" stroke-width="5.5" stroke-linecap="round" fill="none"/>
            <path class="vl-arc vl-arc-3" d="M2 8 Q45 -18 88 8" stroke="#D4AF37" stroke-width="5.5" stroke-linecap="round" fill="none"/>
        </svg>
        
        <!-- Globe image -->
        <img class="globe-img" src="assets/images/vishwaleader-logo-globe.png" />
    </div>
</body>
</html>
